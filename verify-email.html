<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Honeyed Bakery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f9f5f0 0%, #ffe8d6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    .logo {
      color: #d4a574;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      margin-bottom: 15px;
      font-size: 24px;
    }

    .message {
      color: #666;
      margin: 20px 0;
      line-height: 1.6;
    }

    .spinner {
      border: 4px solid #f0f0f0;
      border-top: 4px solid #d4a574;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success {
      color: #27ae60;
      margin: 20px 0;
    }

    .error {
      color: #e74c3c;
      margin: 20px 0;
      padding: 15px;
      background: #fadbd8;
      border-radius: 8px;
    }

    .button {
      background-color: #d4a574;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      transition: background-color 0.3s;
    }

    .button:hover {
      background-color: #c89a62;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      color: #d4a574;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🍰 Honeyed Bakery</div>
    <h1 id="title">Verifying Your Email...</h1>
    <div id="content">
      <div class="spinner"></div>
      <p class="message">Please wait while we verify your email address.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    function getApiBase() {
      return window.APP_CONFIG?.getApiUrl?.() || 'http://localhost:4000';
    }

    async function verifyEmail() {
      try {
        // Get token from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
          showError('No verification token found. Please check your email link.');
          return;
        }

        // Call verify endpoint
        const response = await fetch(`${getApiBase()}/api/auth/verify-email`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess(data.message);
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        } else {
          showError(data.message || 'Verification failed. Please try again.');
        }
      } catch (error) {
        showError('An error occurred: ' + error.message);
      }
    }

    function showSuccess(message) {
      document.getElementById('title').textContent = '✓ Email Verified!';
      document.getElementById('content').innerHTML = `
        <p class="success">${message}</p>
        <p class="message">Redirecting to login page in 3 seconds...</p>
        <a href="login.html" class="button">Go to Login</a>
      `;
    }

    function showError(message) {
      document.getElementById('title').textContent = 'Verification Failed';
      document.getElementById('content').innerHTML = `
        <div class="error">${message}</div>
        <p class="message">Please try the following:</p>
        <ul style="text-align: left; color: #666; margin: 15px 0;">
          <li>Check that the link is complete and correct</li>
          <li>The verification link expires after 24 hours</li>
          <li>Request a new verification email from the signup page</li>
        </ul>
        <a href="login.html" class="button">Back to Login</a>
        <a href="login.html" class="back-link">← Back to Login</a>
      `;
    }

    // Start verification when page loads
    verifyEmail();
  </script>
</body>
</html>
